server {
    listen 80 default_server;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # NOTE: COEP/COOP/CORP intentionally NOT set.
    # Cornerstone3D works without SharedArrayBuffer (single-threaded WASM
    # fallback). Setting COEP=credentialless was breaking third-party
    # widgets (mapmyvisitors, Patreon). If multi-threaded WASM becomes
    # necessary later, re-enable and find a path-scoped solution.

    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok";
    }

    location / {
        # Never cache index.html — asset bundle hashes change every build;
        # a stale index.html ends up referencing .js files that no longer
        # exist on the server, producing a blank page and 404 on the chunk.
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_comp_level 5;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml application/wasm;
    gzip_min_length 1024;
}
